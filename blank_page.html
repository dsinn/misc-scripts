<!-- Exists just for me to maximize the brightness on my monitor -->
<!DOCTYPE html>
<html lang="en">
  <head>
    <title>White Page</title>
  </head>
  <body>
    <script>
function updatePage() {
  const rawHash = window.location.hash;

  if (/^#([0-9a-f]{3}|[0-9a-f]{6})$/i.test(rawHash)) {
    document.documentElement.style.backgroundColor = rawHash;
    document.title = rawHash.toUpperCase();
  } else {
    const cleanedValue = (rawHash.startsWith('#') ? rawHash.slice(1) : rawHash) || 'white';
    document.documentElement.style.backgroundColor = cleanedValue;
    document.title = cleanedValue.charAt(0).toUpperCase() + cleanedValue.slice(1);
  }
}

window.addEventListener('hashchange', updatePage);
window.addEventListener('load', updatePage);
    </script>
  </body>
</html>
